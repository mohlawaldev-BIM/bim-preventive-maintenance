services:
  - type: web
    name: bim-maintenance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && pip3 install ifcopenshell requests
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production