services:
  - type: web
    name: bim-maintenance-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: bim-db
          property: host
      - key: DATABASE_URL
        sync: false